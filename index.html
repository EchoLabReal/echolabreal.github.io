<!DOCTYPE html>
<html>
<head>
  <title>Min side</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background-color: white;
      color: black;
    }

    header {
      padding: 20px;
      border-bottom: 1px solid #ddd;
      text-align: center;
      font-size: 24px;
      letter-spacing: 2px;
    }

    main {
      padding: 40px;
      max-width: 800px;
      margin: auto;
    }

    h1 {
      font-size: 40px;
      font-weight: normal;
    }

    p {
      font-size: 18px;
      line-height: 1.6;
      color: #555;
    }

    button {
      padding: 10px 20px;
      border: 1px solid black;
      background: none;
      cursor: pointer;
      margin-top: 20px;
    }

    button:hover {
      background-color: black;
      color: white;
    }
  </style>

</head>

<body>

  <header>
    MIT NAVN
  </header>

  <main>
    <h1>Velkommen</h1>
    <p>
      Dette er min hjemmeside i en clean og minimalistisk stil.
      Meget simpelt, meget pænt.
    </p>

    <button>Klik mig</button>
  </main>

</body>
</html>
